services:
  - type: web
    name: attendance-app
    runtime: node
    buildCommand: |
      npm install &&
      git clone https://github.com/Hasaoxend/attendance-client.git _client &&
      cd _client &&
      npm install &&
      npm run build &&
      cd .. &&
      cp -r _client/dist public
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: QR_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString

databases:
  - name: attendance-db
    plan: free
