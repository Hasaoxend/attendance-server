services:
  - type: web
    name: attendance-app
    runtime: node
    buildCommand: |
      npm install &&
      cd ../attendance-client &&
      npm install &&
      npm run build &&
      cp -r dist ../attendance-server/public
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: QR_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString

databases:
  - name: attendance-db
    plan: free
